name: Publicar Ghost Shop no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar site sem token privado
        shell: bash
        run: |
          git clone --depth 1 --branch main "https://github.com/${GITHUB_REPOSITORY}.git" repo
          mkdir _site
          cp -r repo/assets repo/img _site/
          cp repo/*.html repo/styles.css repo/script.js _site/
          cp repo/.nojekyll _site/.nojekyll

      - name: Enviar arquivos estaticos
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar no Pages
        id: deployment
        uses: actions/deploy-pages@v5
