name: Publicar Ghost Shop no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar arquivos do repositorio
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Separar arquivos do site
        shell: bash
        run: |
          mkdir _site
          cp -r assets img index.html cadastro.html menu1.html menu2.html menu3.html styles.css script.js .nojekyll _site/

      - name: Enviar arquivos estaticos
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Publicar no Pages
        id: deployment
        uses: actions/deploy-pages@v4
